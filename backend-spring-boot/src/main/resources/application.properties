# General Configuration
server.port=8081
spring.cloud.vault.enabled=false

# Update these to match your local PostgreSQL credentials
spring.datasource.url=jdbc:postgresql://localhost:5432/gblog
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# Database Configuration (Defaults removed - must be set via environment/Vault)
# spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gblog}
# spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
# spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=GBlogHikariCP

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.schemas=blog
spring.flyway.baseline-on-migrate=true

# JPA/Hibernate Configuration
spring.jpa.properties.hibernate.default_schema=blog
spring.jpa.hibernate.ddl-auto=validate

management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# JWT Configuration (Must be set - no default)
app.jwt.secret=${JWT_SECRET:very-secret-key-that-is-at-least-32-characters-long}

# Actuator security
management.endpoint.health.show-details=never
