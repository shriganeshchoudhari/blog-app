# General Configuration
server.port=8081
spring.cloud.vault.enabled=false

# Database Configuration (Defaults for local, overridden by Vault in EKS)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gblog}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.schemas=blog
spring.flyway.baseline-on-migrate=true

# JPA/Hibernate Configuration
spring.jpa.properties.hibernate.default_schema=blog
spring.jpa.hibernate.ddl-auto=validate

management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:change-me-now-and-make-it-long-enough-for-hs256}
