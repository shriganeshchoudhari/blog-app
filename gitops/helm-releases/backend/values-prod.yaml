image:
  repository: shriganeshdockerhub/gblog-backend
  tag: "latest"
  pullPolicy: Always
  pullSecrets:
    - name: dockerhub-secret

replicaCount: 3

service:
  type: ClusterIP
  port: 80
  targetPort: 8081

resources:
  limits:
    cpu: "1000m"
    memory: "1024Mi"
  requests:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: NODE_ENV
    value: production
  - name: LOG_LEVEL
    value: info
  - name: SPRING_DATASOURCE_URL
    valueFrom:
      secretKeyRef:
        name: gblog-db-credentials
        key: url
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: gblog-db-credentials
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: gblog-db-credentials
        key: password
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: gblog-jwt-secret
        key: secret

config:
  key: value

tls:
  enabled: true

otel:
  enabled: true
  endpoint: "http://otel-collector:4317"

rollout:
  enabled: false

imagePullSecrets:
  - name: dockerhub-secret
