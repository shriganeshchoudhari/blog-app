backend:
  replicaCount: 1
  image:
    repository: 239013465815.dkr.ecr.us-east-1.amazonaws.com/gblog-backend
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8081

frontend:
  replicaCount: 1
  image:
    repository: 239013465815.dkr.ecr.us-east-1.amazonaws.com/gblog-frontend
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: NODE_ENV
    value: production
  - name: LOG_LEVEL
    value: info
  - name: SPRING_DATASOURCE_URL
    valueFrom:
      secretKeyRef:
        name: gblog-db-credentials
        key: url
  - name: SPRING_DATASOURCE_USERNAME
    valueFrom:
      secretKeyRef:
        name: gblog-db-credentials
        key: username
  - name: SPRING_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: gblog-db-credentials
        key: password
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: gblog-jwt-secret
        key: secret

config:
  key: value

tls:
  enabled: false

otel:
  enabled: true
  endpoint: "http://otel-collector:4317"

rollout:
  enabled: false

vault:
  enabled: false

imagePullSecrets: []

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: gblog.52.22.194.121.nip.io
      paths:
        - path: /
          pathType: ImplementationSpecific
