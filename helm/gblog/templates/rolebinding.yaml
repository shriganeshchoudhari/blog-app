apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "gblog.fullname" . }}-rolebinding
  labels:
    app: {{ include "gblog.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "gblog.fullname" . }}-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "gblog.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
