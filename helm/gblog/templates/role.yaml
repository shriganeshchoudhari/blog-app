apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gblog.fullname" . }}-role
  labels:
    app: {{ include "gblog.name" . }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
