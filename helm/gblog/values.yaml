replicaCount: 2
image:
  repository: dockerhub/gblog-backend
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

env:
  - name: NODE_ENV
    value: production
  - name: LOG_LEVEL
    value: info

config:
  # ConfigMap data can be injected here if needed
  key: value

tls:
  enabled: false

otel:
  enabled: true
  endpoint: "http://otel-collector:4317"
