name: G-Blog X Full CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build & Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd backend-spring-boot
          mvn -B verify sonar:sonar -Dsonar.projectKey=gblog-backend

      - name: Security Scan (OWASP)
        run: |
          cd backend-spring-boot
          mvn org.owasp:dependency-check-maven:check

      - name: Build & Package
        run: |
          cd backend-spring-boot
          mvn -B package -DskipTests

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Docker Login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend Docker Image
        if: github.event_name != 'pull_request'
        id: docker_build_backend
        run: |
          IMAGE_TAG="v${{ github.run_number }}"
          REGISTRY_USER="${{ secrets.DOCKER_USERNAME }}"
          docker build -t ${REGISTRY_USER}/gblog-backend:${IMAGE_TAG} ./backend-spring-boot
          docker push ${REGISTRY_USER}/gblog-backend:${IMAGE_TAG}
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image=${REGISTRY_USER}/gblog-backend" >> $GITHUB_OUTPUT

      - name: Build & Push Frontend Docker Image
        if: github.event_name != 'pull_request'
        id: docker_build_frontend
        run: |
          IMAGE_TAG="v${{ github.run_number }}"
          REGISTRY_USER="${{ secrets.DOCKER_USERNAME }}"
          docker build -t ${REGISTRY_USER}/gblog-frontend:${IMAGE_TAG} ./frontend
          docker push ${REGISTRY_USER}/gblog-frontend:${IMAGE_TAG}
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image=${REGISTRY_USER}/gblog-frontend" >> $GITHUB_OUTPUT

      - name: Container Scan (Trivy) - Backend
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'docker.io/${{ secrets.DOCKER_USERNAME }}/gblog-backend:v${{ github.run_number }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Container Scan (Trivy) - Frontend
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'docker.io/${{ secrets.DOCKER_USERNAME }}/gblog-frontend:v${{ github.run_number }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Security Gates
        if: github.event_name != 'pull_request'
        run: |
          bash .github/scripts/security_gates.sh

      - name: GitOps Sync (Update Helm)
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          sed -i "s|tag:.*|tag: v${{ github.run_number }}|" helm/gblog/values-prod.yaml
          sed -i "s|repository:.*|repository: ${{ secrets.DOCKER_USERNAME }}/gblog-backend|" helm/gblog/values-prod.yaml
          git add helm/gblog/values-prod.yaml
          git commit -m "chore: update image to v${{ github.run_number }} [skip ci]"
          git push origin main

      - name: ArgoCD Sync
        if: github.event_name != 'pull_request'
        env:
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/download/v2.12.0/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd
          argocd login $ARGOCD_SERVER --auth-token $ARGOCD_TOKEN --insecure=false
          argocd app sync gblog-app --server $ARGOCD_SERVER
